# Optional: run Cursor Agent in CI using this repo's agent rules (AGENTS.md / .cursor/rules).
# Requires CURSOR_API_KEY in repo secrets. Skip this workflow if you don't use Cursor API.
# See docs: https://cursor.com/docs/cli/github-actions

name: Cursor Agent

on:
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base branch to diff against (e.g. main)"
        required: false
        default: "main"

jobs:
  cursor-review:
    name: Cursor agent review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR diff
        run: |
          BASE_REF="${{ github.base_ref || github.event.inputs.base_ref || 'main' }}"
          git fetch origin "$BASE_REF"
          git diff "origin/$BASE_REF"...HEAD -- \
            ':(exclude)package-lock.json' \
            ':(exclude)*.lock' \
            > pr-diff.txt
          echo "Diff size: $(wc -l < pr-diff.txt) lines"

      - name: Install Cursor CLI
        run: |
          curl -fsSL https://cursor.com/install | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Build prompt file
        run: |
          cat > prompt.txt << 'PROMPT_EOF'
          You are reviewing a pull request for a React + Express PokeDex monorepo.
          Project conventions are in AGENTS.md and .cursor/rules/.
          Here is the full diff of this PR:
          PROMPT_EOF
          cat pr-diff.txt >> prompt.txt
          cat >> prompt.txt << 'PROMPT_EOF'
          Review this diff:
          - Do API changes update server, openapi.yaml, AND client together?
          - Are TypeScript types consistent between client and server?
          - Are there obvious bugs or missing test coverage?
          Write a concise review (bullet points for issues, a short summary of what looks good). Do NOT modify any files.
          PROMPT_EOF

      - name: Run Cursor Agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          AGENT_BIN=$(which agent 2>/dev/null || find "$HOME" -name "agent" -type f 2>/dev/null | head -1)
          echo "Agent binary: $AGENT_BIN"
          echo "::notice::Running Cursor Agent (may take 1-3 minutes)..."
          timeout 480 "$AGENT_BIN" -p --trust --output-format text "$(cat prompt.txt)" 2>&1 | tee cursor-review.txt || true
        continue-on-error: true

      - name: Ensure review file exists
        if: always()
        run: |
          touch cursor-review.txt
          if [ ! -s cursor-review.txt ]; then echo "Cursor Agent did not run (missing CURSOR_API_KEY?) or produced no output." >> cursor-review.txt; fi

      - name: Post review as PR comment
        if: github.event_name == 'pull_request' && hashFiles('cursor-review.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/post-cursor-review.sh

      - name: Upload Cursor review
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cursor-agent-review
          path: cursor-review.txt
          retention-days: 7
