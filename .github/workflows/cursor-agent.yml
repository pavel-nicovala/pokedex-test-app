# Optional: run Cursor Agent in CI using this repo's agent rules (AGENTS.md / .cursor/rules).
# Requires CURSOR_API_KEY in repo secrets. Skip this workflow if you don't use Cursor API.
# See docs: https://cursor.com/docs/cli/github-actions

name: Cursor Agent (optional)

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  cursor-review:
    name: Cursor agent review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cursor CLI
        run: |
          curl -fsSL https://cursor.com/install | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH
          echo "CURSOR_BIN=$HOME/.cursor/bin" >> $GITHUB_ENV

      - name: Run Cursor Agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PATH: ${{ env.PATH }}:${{ env.CURSOR_BIN }}
        run: |
          echo "::notice:: Running Cursor Agent (API call may take 1-3 minutes)..."
          PROMPT="Use the project instructions in AGENTS.md and the rules in .cursor/rules/ as your guide. Review the PR diff for this repo: Do the changes follow the workflows in AGENTS.md? Are client/server types and API usage consistent? Any obvious issues or missing tests? Write a short review. Do NOT modify any files; only output your review to stdout."
          timeout 480 "$HOME/.cursor/bin/agent" -p --trust --output-format text "$PROMPT" 2>&1 | tee cursor-review.txt || true
        continue-on-error: true

      - name: Ensure review file exists
        if: always()
        run: |
          touch cursor-review.txt
          if [ ! -s cursor-review.txt ]; then echo "Cursor Agent did not run (missing CURSOR_API_KEY?) or produced no output." >> cursor-review.txt; fi

      - name: Upload Cursor review
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cursor-agent-review
          path: cursor-review.txt
          retention-days: 7
